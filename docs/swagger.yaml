basePath: /
definitions:
  domain.Account:
    properties:
      account_id:
        type: string
      account_type:
        type: string
      balance:
        type: integer
      color_hex:
        type: string
      created_at:
        type: string
      currency:
        type: string
      external_account_id:
        type: string
      is_archived:
        type: boolean
      is_imported:
        type: boolean
      last_synced_at:
        type: string
      name_account:
        type: string
      user_id:
        type: string
    type: object
  domain.Category:
    properties:
      category_id:
        type: string
      icon_url:
        type: string
      is_custom:
        type: boolean
      is_income:
        type: boolean
      name_category:
        type: string
      user_id:
        type: string
    type: object
  domain.CategoryCompareReport:
    properties:
      category_id:
        type: string
      category_name:
        type: string
      delta_amount:
        type: integer
      delta_percent:
        type: number
      first_period_amount:
        type: integer
      icon_url:
        type: string
      second_period_amount:
        type: integer
    type: object
  domain.CategoryReport:
    properties:
      category_id:
        type: string
      category_name:
        type: string
      icon_url:
        type: string
      share_percent:
        type: number
      total_amount:
        type: integer
    type: object
  domain.DailyReport:
    properties:
      date:
        type: string
      total_amount:
        type: integer
    type: object
  domain.GoalContribution:
    properties:
      amount:
        type: integer
      contribution_date:
        type: string
      contribution_id:
        type: string
      created_at:
        type: string
      goal_id:
        type: string
      transaction_id:
        type: string
      user_id:
        type: string
    type: object
  domain.GoalDetails:
    properties:
      contributions:
        items:
          $ref: '#/definitions/domain.GoalContribution'
        type: array
      excess_amount:
        type: integer
      forecast:
        $ref: '#/definitions/domain.GoalForecast'
      redirect_suggestions:
        items:
          $ref: '#/definitions/domain.GoalRedirectSuggestion'
        type: array
      summary:
        $ref: '#/definitions/domain.GoalSummary'
    type: object
  domain.GoalForecast:
    properties:
      average_monthly_contribution:
        type: integer
      estimated_reach_date:
        type: string
      remaining_months:
        type: integer
    type: object
  domain.GoalRedirectSuggestion:
    properties:
      goal_id:
        type: string
      name_goal:
        type: string
      needed_amount:
        type: integer
    type: object
  domain.GoalStatus:
    enum:
    - in_progress
    - achieved
    - overdue
    type: string
    x-enum-varnames:
    - GoalStatusInProgress
    - GoalStatusAchieved
    - GoalStatusOverdue
  domain.GoalSummary:
    properties:
      current_amount:
        type: integer
      goal_id:
        type: string
      name_goal:
        type: string
      progress_percent:
        type: number
      status:
        $ref: '#/definitions/domain.GoalStatus'
      target_amount:
        type: integer
      target_date:
        type: string
    type: object
  domain.MonthlyReport:
    properties:
      month:
        type: string
      total_amount:
        type: integer
    type: object
  domain.SummaryReport:
    properties:
      total_expense:
        type: integer
      total_income:
        type: integer
    type: object
  domain.Transaction:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      bank_fee:
        type: integer
      category_id:
        type: string
      comment:
        type: string
      completed_at:
        type: string
      currency:
        type: string
      external_transaction_id:
        type: string
      is_hidden:
        type: boolean
      is_imported:
        type: boolean
      is_income:
        type: boolean
      mcc_code:
        type: string
      name_transaction:
        type: string
      receiver_account:
        type: string
      sender_account:
        type: string
      status:
        type: string
      transaction_id:
        type: string
      user_id:
        type: string
    type: object
  handler.AddContributionReq:
    properties:
      amount:
        type: integer
      contribution_date:
        type: string
      transaction_id:
        type: string
    type: object
  handler.ChangePasswordReq:
    properties:
      password:
        type: string
    type: object
  handler.CreateAccountReq:
    properties:
      account_type:
        example: manual
        type: string
      color_hex:
        example: '#FF0000'
        type: string
      currency:
        example: RUB
        type: string
      external_account_id:
        example: "null"
        type: string
      initial_balance:
        example: 100000
        type: integer
      is_imported:
        example: false
        type: boolean
      name:
        example: Мой кошелек
        type: string
    type: object
  handler.CreateCategoryReq:
    properties:
      icon_url:
        type: string
      is_income:
        type: boolean
      name:
        type: string
    type: object
  handler.CreateGoalReq:
    properties:
      name_goal:
        type: string
      target_amount:
        type: integer
      target_date:
        type: string
    type: object
  handler.CreateTransReq:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      bank_fee:
        type: integer
      category_id:
        type: string
      comment:
        type: string
      completed_at:
        type: string
      currency:
        type: string
      is_income:
        type: boolean
      name:
        type: string
      status:
        type: string
    type: object
  handler.DeleteCategoryReq:
    properties:
      replacement_category_id:
        type: string
    type: object
  handler.LoginReq:
    properties:
      identifier:
        type: string
      password:
        type: string
    type: object
  handler.RegisterReq:
    properties:
      email:
        type: string
      login:
        type: string
      password:
        type: string
    type: object
  handler.ToggleVisibilityReq:
    properties:
      hide:
        type: boolean
      transaction_ids:
        items:
          type: string
        type: array
    type: object
  handler.UpdateAccountReq:
    properties:
      initial_balance:
        example: 150000
        type: integer
      name:
        example: Новое название кошелька
        type: string
    type: object
  handler.UpdateCategoryReq:
    properties:
      icon_url:
        type: string
      name:
        type: string
    type: object
  handler.UpdateGoalReq:
    properties:
      name_goal:
        type: string
      target_amount:
        type: integer
      target_date:
        type: string
    type: object
  handler.UpdateTransReq:
    properties:
      amount:
        type: integer
      bank_fee:
        type: integer
      category_id:
        type: string
      comment:
        type: string
      completed_at:
        type: string
      currency:
        type: string
      is_income:
        type: boolean
      name:
        type: string
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для приложения по управлению личными финансами.
  title: Finance Manager API
  version: "1.0"
paths:
  /api/v1/accounts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Account'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Получить все активные счета
      tags:
      - accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные счета
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAccountReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Создать счет
      tags:
      - accounts
  /api/v1/accounts/{id}:
    delete:
      parameters:
      - description: ID счета
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Архивировать (удалить) счет
      tags:
      - accounts
    put:
      consumes:
      - application/json
      parameters:
      - description: ID счета
        in: path
        name: id
        required: true
        type: string
      - description: Название и/или начальный баланс
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateAccountReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Обновить ручной счет
      tags:
      - accounts
  /api/v1/accounts/{id}/sync/pdf:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID счета
        in: path
        name: id
        required: true
        type: string
      - description: PDF выписка Т-Банка
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Синхронизировать импортированный счет по PDF выписке
      tags:
      - accounts
  /api/v1/accounts/import/pdf:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: PDF выписка Т-Банка
        in: formData
        name: file
        required: true
        type: file
      - description: Название счета
        in: formData
        name: name
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Импортировать счет и транзакции из PDF выписки Т-Банка
      tags:
      - accounts
  /api/v1/analytics/categories:
    get:
      parameters:
      - description: Начальная дата (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Конечная дата (RFC3339)
        in: query
        name: end_date
        type: string
      - description: 'Период по умолчанию: day/week/month'
        in: query
        name: period
        type: string
      - description: 'Тип: доходы(true) или расходы(false)'
        in: query
        name: is_income
        type: boolean
      - description: Учитывать скрытые транзакции
        in: query
        name: include_hidden
        type: boolean
      - description: CSV список account_id для фильтра
        in: query
        name: account_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.CategoryReport'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Получить траты по категориям
      tags:
      - analytics
  /api/v1/analytics/compare/categories:
    get:
      parameters:
      - description: Первый месяц в формате YYYY-MM
        in: query
        name: first_month
        required: true
        type: string
      - description: Второй месяц в формате YYYY-MM
        in: query
        name: second_month
        required: true
        type: string
      - description: Доходы (true) или расходы (false)
        in: query
        name: is_income
        type: boolean
      - description: Учитывать скрытые транзакции
        in: query
        name: include_hidden
        type: boolean
      - description: CSV список account_id для фильтра
        in: query
        name: account_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.CategoryCompareReport'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Сравнить категории между двумя месяцами
      tags:
      - analytics
  /api/v1/analytics/daily:
    get:
      parameters:
      - description: Доходы (true) или расходы (false)
        in: query
        name: is_income
        type: boolean
      - description: Начальная дата (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Конечная дата (RFC3339)
        in: query
        name: end_date
        type: string
      - description: 'Период по умолчанию: day/week/month'
        in: query
        name: period
        type: string
      - description: Учитывать скрытые транзакции
        in: query
        name: include_hidden
        type: boolean
      - description: CSV список account_id для фильтра
        in: query
        name: account_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.DailyReport'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Получить динамику по дням
      tags:
      - analytics
  /api/v1/analytics/monthly:
    get:
      parameters:
      - description: Доходы (true) или расходы (false)
        in: query
        name: is_income
        type: boolean
      - description: Начальная дата (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Конечная дата (RFC3339)
        in: query
        name: end_date
        type: string
      - description: 'Период по умолчанию: day/week/month'
        in: query
        name: period
        type: string
      - description: Учитывать скрытые транзакции
        in: query
        name: include_hidden
        type: boolean
      - description: CSV список account_id для фильтра
        in: query
        name: account_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.MonthlyReport'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Получить динамику по месяцам
      tags:
      - analytics
  /api/v1/analytics/summary:
    get:
      parameters:
      - description: Начальная дата (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Конечная дата (RFC3339)
        in: query
        name: end_date
        type: string
      - description: 'Период по умолчанию: day/week/month'
        in: query
        name: period
        type: string
      - description: Учитывать скрытые транзакции
        in: query
        name: include_hidden
        type: boolean
      - description: CSV список account_id для фильтра
        in: query
        name: account_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.SummaryReport'
      security:
      - ApiKeyAuth: []
      summary: Получить сводку (доходы и расходы)
      tags:
      - analytics
  /api/v1/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Category'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Получить категории
      tags:
      - categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные категории
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateCategoryReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Создать категорию
      tags:
      - categories
  /api/v1/categories/{id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: ID категории
        in: path
        name: id
        required: true
        type: string
      - description: Опционально ID для переноса
        in: body
        name: request
        schema:
          $ref: '#/definitions/handler.DeleteCategoryReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Удалить категорию
      tags:
      - categories
    put:
      consumes:
      - application/json
      parameters:
      - description: ID категории
        in: path
        name: id
        required: true
        type: string
      - description: Новые данные
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateCategoryReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Обновить категорию
      tags:
      - categories
  /api/v1/goals:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.GoalSummary'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Получить список целей (сводка)
      tags:
      - goals
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные цели
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateGoalReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Создать новую цель
      tags:
      - goals
  /api/v1/goals/{id}:
    delete:
      parameters:
      - description: ID цели
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Удалить цель
      tags:
      - goals
    get:
      parameters:
      - description: ID цели
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.GoalDetails'
      security:
      - ApiKeyAuth: []
      summary: Получить детали цели (история и прогноз)
      tags:
      - goals
    put:
      consumes:
      - application/json
      parameters:
      - description: ID цели
        in: path
        name: id
        required: true
        type: string
      - description: Новые данные цели
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateGoalReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Обновить параметры цели
      tags:
      - goals
  /api/v1/goals/{id}/contributions:
    post:
      consumes:
      - application/json
      parameters:
      - description: ID цели
        in: path
        name: id
        required: true
        type: string
      - description: Данные пополнения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.AddContributionReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Добавить пополнение цели
      tags:
      - goals
  /api/v1/recommendations/budget:
    get:
      parameters:
      - description: Планируемый общий бюджет расходов (в копейках)
        in: query
        name: planned_total
        required: true
        type: integer
      - description: Сколько последних месяцев анализировать (1..12, по умолчанию
          3)
        in: query
        name: months
        type: integer
      - description: Учитывать скрытые транзакции
        in: query
        name: include_hidden
        type: boolean
      - description: CSV список account_id для фильтра
        in: query
        name: account_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Получить рекомендации по бюджету
      tags:
      - recommendations
  /api/v1/transactions:
    get:
      parameters:
      - description: ID счета
        in: query
        name: account_id
        type: string
      - description: ID категории
        in: query
        name: category_id
        type: string
      - description: Тип (доход/расход)
        in: query
        name: is_income
        type: boolean
      - description: Начальная дата (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Конечная дата (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Показать скрытые
        in: query
        name: is_hidden
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Transaction'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Получить транзакции (с фильтрами)
      tags:
      - transactions
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные транзакции
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateTransReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Создать транзакцию
      tags:
      - transactions
  /api/v1/transactions/{id}:
    delete:
      parameters:
      - description: ID транзакции
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Удалить транзакцию
      tags:
      - transactions
    put:
      consumes:
      - application/json
      parameters:
      - description: ID транзакции
        in: path
        name: id
        required: true
        type: string
